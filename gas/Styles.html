<style>
  :root {
    color-scheme: light;
    --bg: #f6f7f9;
    --panel: #fff;
    --line: #d8dee8;
    --text: #1e293b;
    --muted: #64748b;
    --accent: #0f766e;
    --accent-strong: #0b5f59;
    --warn: #b45309;
    --resolved: #667085;
    --preview-font-size: 15px;
    --comment-font-size: 14px;
  }

  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #111827;
    --panel: #1f2937;
    --line: #374151;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --accent: #2dd4bf;
    --accent-strong: #5eead4;
    --warn: #f59e0b;
    --resolved: #9ca3af;

  body {

    min-height: 36px;
    padding: 7px 12px;

  button { background: var(--panel); cursor: pointer; }
  button:disabled { cursor: not-allowed; opacity: .55; }
  .topbar {
    align-items: center;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 16px;
    justify-content: space-between;
    padding: 12px 18px;
  }
  .brand { align-items: center; display: flex; gap: 12px; min-width: 280px; }
  .brand-mark {

    color: #fff;

    height: 40px;
    justify-content: center;
    width: 40px;
  }

  .toolbar { display: flex; gap: 8px; justify-content: flex-end; }
  #folderIdInput { min-width: min(52vw, 460px); }
  .more-menu,

  .more-menu summary,
  .help-menu summary {

    border: 1px solid var(--line);
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    font-weight: 700;
    justify-content: center;
    list-style: none;
    min-height: 36px;
    padding: 7px 12px;
  }
  .more-menu summary::-webkit-details-marker,
  .help-menu summary::-webkit-details-marker { display: none; }
  .more-menu-panel,
  .help-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;

    gap: 8px;
    min-width: min(420px, calc(100vw - 28px));

    right: 0;

  .help-panel {

    max-height: min(72vh, 620px);
    min-width: min(480px, calc(100vw - 28px));

    padding: 14px;
  }
  .help-panel h2 { font-size: 15px; }
  .help-panel dl { display: grid; gap: 8px; margin: 0; }
  .help-panel dt { font-weight: 700; }
  .help-panel dd { color: var(--muted); line-height: 1.55; margin: 0; }
  .more-menu-panel #folderIdInput,
  .more-menu-panel button {
    min-width: 0;
    width: 100%;
  }
  .menu-check { align-items: center; color: var(--text); display: flex; gap: 8px; min-height: 34px; padding: 4px; }
  .menu-field { color: var(--text); display: grid; gap: 6px; padding: 4px; }
  .menu-field select { width: 100%; }
  :root[data-preview-font-size="small"] { --preview-font-size: 14px; }
  :root[data-preview-font-size="large"] { --preview-font-size: 17px; }
  :root[data-preview-font-size="xlarge"] { --preview-font-size: 20px; }
  :root[data-comment-font-size="small"] { --comment-font-size: 13px; }
  :root[data-comment-font-size="large"] { --comment-font-size: 16px; }
  :root[data-comment-font-size="xlarge"] { --comment-font-size: 18px; }
  .layout {
    display: grid;
    gap: 14px;
    grid-template-columns: minmax(210px, 260px) minmax(360px, 1fr) minmax(280px, 360px);
    height: calc(100vh - 65px);
    padding: 14px;
  }
  :root[data-hide-comments="true"] .layout { grid-template-columns: minmax(210px, 260px) minmax(360px, 1fr); }
  :root[data-hide-comments="true"] .comments,
  :root[data-hide-comments="true"] #addCommentButton { display: none; }
  .sidebar, .viewer, .comments {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    min-height: 0;
  }
  .sidebar, .comments, .viewer { display: flex; flex-direction: column; }
  .document-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
  .panel-head, .document-bar {
    align-items: center;
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 12px;
    justify-content: space-between;
    padding: 12px;
  }
  .panel-head h2, .document-bar h2 { font-size: 15px; }
  .file-list, .comment-list { overflow: auto; padding: 8px; }
  .toc-panel { border-bottom: 1px solid var(--line); }
  .toc-panel summary { cursor: pointer; font-weight: 650; padding: 10px 14px; }
  .toc-list { display: grid; gap: 2px; max-height: 220px; overflow: auto; padding: 0 12px 10px; }
  .toc-item { background: transparent; border: 1px solid transparent; color: var(--text); display: block; line-height: 1.35; min-height: 30px; overflow-wrap: anywhere; padding: 6px 8px; text-align: left; width: 100%; }
  .toc-item:hover { border-color: var(--accent); }
  .toc-level-2 { padding-left: 18px; }
  .toc-level-3 { padding-left: 28px; }
  .toc-level-4, .toc-level-5, .toc-level-6 { padding-left: 38px; }
  .file-item {
    background: transparent;
    border: 1px solid transparent;
    display: block;
    overflow-wrap: anywhere;
    text-align: left;
    width: 100%;
  }
  .file-item.active { background: color-mix(in srgb, var(--accent) 16%, transparent); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); color: var(--accent-strong); font-weight: 650; }
  .markdown-preview { font-size: var(--preview-font-size); line-height: 1.55; overflow: auto; padding: 18px clamp(12px, 3vw, 36px); }
  .markdown-editor {
    border: 0;
    flex: 1;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    line-height: 1.6;
    min-height: 0;
    outline: none;
    overflow: auto;
    padding: 18px clamp(12px, 3vw, 36px);
    resize: none;
    width: 100%;
  }
  .md-line {
    border-left: 3px solid transparent;
    display: grid;
    gap: 12px;
    grid-template-columns: 44px minmax(0, 1fr);
    margin: 0 -8px;
    padding: 0 8px;
  }
  :root[data-hide-line-numbers="true"] .md-line { gap: 0; grid-template-columns: minmax(0, 1fr); }
  :root[data-hide-comments="true"] .md-line { max-width: 980px; margin-left: auto; margin-right: auto; width: 100%; }
  :root[data-hide-line-numbers="true"] .line-number { display: none; }
  .md-line.has-comment { background: color-mix(in srgb, var(--warn) 14%, transparent); border-left-color: var(--warn); }
  .md-line.has-resolved-comment { background: color-mix(in srgb, var(--muted) 10%, transparent); border-left-color: #94a3b8; }
  .md-line.selected-line { background: color-mix(in srgb, var(--accent) 16%, transparent); border-left-color: var(--accent); }
  .md-line.jump-line { background: color-mix(in srgb, var(--warn) 24%, transparent); border-left-color: #d97706; }
  :root[data-hide-comments="true"] .md-line.has-comment,
  :root[data-hide-comments="true"] .md-line.has-resolved-comment,
  :root[data-hide-comments="true"] .md-line.selected-line,
  :root[data-hide-comments="true"] .md-line.jump-line { background: transparent; border-left-color: transparent; }
  .line-number {
    align-self: stretch;
    background: transparent;
    border: 0;
    color: var(--muted);
    font-size: 12px;
    min-height: 0;
    padding: 0 6px;
    text-align: right;
  }
  .markdown-preview p, .markdown-preview ul, .markdown-preview pre, .markdown-preview blockquote, .markdown-preview table { margin: 0 0 .6em; }
  .md-line-content { max-width: 980px; min-width: 0; }
  .markdown-preview h1, .markdown-preview h2 { border-bottom: 1px solid var(--line); padding-bottom: .25em; }
  .markdown-preview li + li { margin-top: .25em; }
  .markdown-preview code { background: color-mix(in srgb, var(--muted) 16%, transparent); border-radius: 4px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; padding: 2px 5px; }
  .markdown-preview pre { background: #111827; border-radius: 8px; color: #e5e7eb; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; overflow: auto; padding: 14px; }
  .markdown-preview pre code { background: transparent; padding: 0; }
  .markdown-preview img {
    border: 1px solid var(--line);
    border-radius: 8px;
    display: block;
    height: auto;
    margin: 8px 0;
    max-width: 100%;
  }
  .markdown-preview img.image-missing {
    min-height: 40px;
    padding: 10px;
  }
  .mermaid-block {
    background: color-mix(in srgb, var(--muted) 8%, var(--panel));
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: .8em;
    overflow: auto;
    padding: 12px;
  }
  .mermaid-block.rendered { text-align: center; }
  .mermaid-block svg { height: auto; max-width: 100%; }
  .mermaid-block.render-error { border-color: #f59e0b; }
  .mermaid-fallback { text-align: left; }
  .markdown-preview table { border-collapse: collapse; width: 100%; }
  .markdown-preview th, .markdown-preview td { border: 1px solid var(--line); padding: 6px 8px; }
  .markdown-preview tr:nth-child(even) { background: color-mix(in srgb, var(--muted) 6%, transparent); }
  .md-line:has(.blank-line) { gap: 0; grid-template-columns: 44px minmax(0, 1fr); min-height: 6px; }
  .md-line:has(.blank-line) .line-number { font-size: 0; min-height: 6px; padding: 0; }
  .md-line:has(.blank-line) .md-line-content { height: 6px; line-height: 0; }
  :root[data-show-blank-lines="true"] .md-line:has(.blank-line) { min-height: 24px; }
  :root[data-show-blank-lines="true"] .md-line:has(.blank-line) .line-number { font-size: 12px; min-height: 24px; padding: 0 6px; }
  :root[data-show-blank-lines="true"] .md-line:has(.blank-line) .md-line-content { height: 24px; }
  .blank-line { display: block; height: 0; line-height: 0; }
  .comment-card { border: 1px solid var(--line); border-radius: 8px; font-size: var(--comment-font-size); margin-bottom: 10px; padding: 10px; }
  .comment-card.resolved { background: color-mix(in srgb, var(--muted) 8%, var(--panel)); color: var(--resolved); }
  .comment-card.missing-target { border-color: #f59e0b; }
  .comment-card.approximate-target { border-color: #d97706; }
  .comment-meta, .reply-meta { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .comment-quote { border-left: 3px solid var(--warn); color: #475569; font-size: calc(var(--comment-font-size) - 1px); margin-bottom: 8px; padding-left: 8px; white-space: pre-wrap; }
  .comment-body, .reply-body { white-space: pre-wrap; }
  .comment-actions, .reply-form { display: flex; gap: 8px; margin-top: 10px; }
  .reply-actions { display: flex; gap: 8px; margin-top: 8px; }
  .reply-actions button { min-height: 32px; padding: 5px 10px; }
  .danger-button { border-color: #fca5a5; color: #b91c1c; }
  .danger-button:hover { background: #fef2f2; border-color: #ef4444; }
  .reply-list { display: grid; gap: 8px; margin-top: 10px; }
  .reply-item { background: color-mix(in srgb, var(--muted) 8%, var(--panel)); border-left: 3px solid #94a3b8; padding: 8px 10px; }
  .reply-form textarea { flex: 1; min-height: 42px; }
  dialog { border: 1px solid var(--line); border-radius: 8px; max-width: min(620px, calc(100vw - 28px)); padding: 0; width: 620px; }
  dialog::backdrop { background: rgba(15, 23, 42, .35); }
  .comment-form { display: grid; gap: 14px; padding: 18px; }
  .comment-form label { color: var(--muted); display: grid; gap: 6px; font-size: 13px; }
  textarea { border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; resize: vertical; }
  menu { display: flex; gap: 8px; justify-content: flex-end; margin: 0; padding: 0; }
  #loadFolderButton, #addCommentButton { background: var(--accent); border-color: var(--accent); color: #fff; }
  .folder-dialog { display: grid; gap: 12px; padding: 18px; }
  .dialog-head { align-items: center; display: flex; justify-content: space-between; gap: 12px; }
  .folder-search { display: grid; gap: 8px; grid-template-columns: minmax(0, 1fr) auto; }
  .folder-breadcrumb { color: var(--muted); font-size: 13px; overflow-wrap: anywhere; }
  .folder-list { border: 1px solid var(--line); border-radius: 6px; max-height: min(420px, 55vh); overflow: auto; padding: 6px; }
  .folder-item {
    align-items: center;
    background: transparent;
    border: 1px solid transparent;
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    text-align: left;
    width: 100%;
  }
  .folder-item:hover { background: color-mix(in srgb, var(--accent) 16%, transparent); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
  .empty { color: var(--muted); padding: 10px; }
  @media (max-width: 980px) {
    .topbar, .toolbar { align-items: stretch; flex-direction: column; }
    .layout { grid-template-columns: 1fr; height: auto; }
    #folderIdInput { min-width: 0; width: 100%; }
  }
</style>
